<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent 状态可视化 v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0a0f;
      font-family: 'SF Pro', -apple-system, sans-serif;
    }
    #canvas-container { 
      width: 100vw; 
      height: 100vh; 
    }
    #status-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      z-index: 100;
    }
    #status-panel h1 {
      font-size: 24px;
      font-weight: 300;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    #current-state {
      font-size: 14px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #state-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    #task-info {
      margin-top: 20px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      max-width: 300px;
      backdrop-filter: blur(10px);
    }
    #task-info h3 {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    #task-text {
      font-size: 14px;
      color: #fff;
      line-height: 1.5;
    }
    #connection-status {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 12px;
      color: #444;
    }
    #connection-status.connected { color: #4ade80; }
    #connection-status.disconnected { color: #f87171; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="status-panel">
    <h1>🗡️ 眉间尺</h1>
    <div id="current-state">
      <span id="state-dot"></span>
      <span id="state-text">空闲中</span>
    </div>
    <div id="task-info">
      <h3>当前任务</h3>
      <p id="task-text">等待任务...</p>
    </div>
  </div>
  
  <div id="connection-status">● 连接中...</div>
  
  <div id="audio-btn" onclick="initAudio(); this.style.display='none';" style="position:fixed;bottom:20px;right:20px;padding:10px 20px;background:rgba(255,255,255,0.1);color:#888;border:1px solid #444;border-radius:20px;cursor:pointer;font-size:12px;z-index:100;">🔊 开启音效</div>
  
  <div id="quote" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:14px;font-style:italic;text-align:center;max-width:80%;z-index:100;font-family:'SF Pro',-apple-system,sans-serif;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============== 状态配置 ==============
    const STATE_CONFIG = {
      idle: {
        color: 0x00ffcc,      // 青色 - 科幻感
        emissive: 0x00aa88,
        speed: 0.5,
        scale: 1,
        message: '空闲中',
        animation: 'breathe'
      },
      thinking: {
        color: 0x00aaff,      // 蓝色
        emissive: 0x0066ff,
        speed: 1.5,
        scale: 1.05,
        message: '思考中',
        animation: 'scan'
      },
      working: {
        color: 0xffaa00,      // 橙色
        emissive: 0xff6600,
        speed: 2,
        scale: 1.1,
        message: '工作中',
        animation: 'active'
      },
      error: {
        color: 0xff3333,      // 红色
        emissive: 0xff0000,
        speed: 3,
        scale: 1.15,
        message: '遇到问题',
        animation: 'alert'
      },
      waiting: {
        color: 0xaa66ff,      // 紫色
        emissive: 0x8800ff,
        speed: 0.8,
        scale: 1,
        message: '等待中',
        animation: 'rotate'
      }
    };

    // ============== Three.js 场景 ==============
    let scene, camera, renderer, agent, agentEdges, baseRing;
    let currentState = 'idle';
    let targetColor, targetEmissive, targetSpeed, targetScale;
    let clock = new THREE.Clock();

    // ============== 科幻音效 ==============
    let audioCtx, masterGain;
    
    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(audioCtx.destination);
    }
    
    function playTone(freq, duration, type = 'sine', volume = 0.5) {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      
      osc.connect(gain);
      gain.connect(masterGain);
      
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    function playStateSound(state) {
      switch(state) {
        case 'idle':
          // 空灵宇宙待机音效 - 科幻空灵感
          playTone(80, 3, 'sine', 0.25);
          playTone(120, 3, 'sine', 0.15);  // 和声
          setTimeout(() => playTone(180, 2.5, 'sine', 0.2), 500);
          setTimeout(() => playTone(90, 3, 'sine', 0.15), 1000);
          setTimeout(() => playTone(140, 2.5, 'sine', 0.12), 1500);
          break;
        case 'thinking':
          // 扫描音效 - 上升音调
          playTone(200, 0.3, 'sine', 0.2);
          setTimeout(() => playTone(400, 0.3, 'sine', 0.2), 150);
          setTimeout(() => playTone(600, 0.3, 'sine', 0.2), 300);
          setTimeout(() => playTone(300, 0.4, 'sine', 0.15), 450);
          break;
        case 'working':
          // 工作音效 - 活跃脉冲
          playTone(150, 0.2, 'square', 0.15);
          setTimeout(() => playTone(200, 0.2, 'square', 0.15), 100);
          setTimeout(() => playTone(250, 0.2, 'square', 0.15), 200);
          break;
        case 'error':
          // 错误警报
          playTone(800, 0.3, 'sawtooth', 0.3);
          setTimeout(() => playTone(600, 0.3, 'sawtooth', 0.3), 150);
          setTimeout(() => playTone(400, 0.5, 'sawtooth', 0.25), 300);
          break;
        case 'waiting':
          // 等待音效 - 缓慢脉动
          playTone(100, 1, 'sine', 0.2);
          setTimeout(() => playTone(150, 0.8, 'sine', 0.15), 600);
          break;
      }
    }

    function init() {
      // 场景
      scene = new THREE.Scene();
      
      // 相机
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;
      
      // 渲染器
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.getElementById('canvas-container').appendChild(renderer.domElement);
      
      // 光源
      const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
      scene.add(ambientLight);
      
      const pointLight = new THREE.PointLight(0xffffff, 1);
      pointLight.position.set(5, 5, 5);
      scene.add(pointLight);
      
      // 创建 Agent 主体（科幻黑石碑 - 2001太空漫游风格）
      // 主碑体 - 黑色反光长方体
      const monolithGeometry = new THREE.BoxGeometry(0.8, 2.5, 0.15);
      const monolithMaterial = new THREE.MeshStandardMaterial({
        color: 0x111111,
        emissive: STATE_CONFIG.idle.color,
        emissiveIntensity: 0.3,
        metalness: 0.9,
        roughness: 0.1,
      });
      agent = new THREE.Mesh(monolithGeometry, monolithMaterial);
      scene.add(agent);
      
      // 发光边缘
      const edgesGeometry = new THREE.EdgesGeometry(monolithGeometry);
      const edgesMaterial = new THREE.LineBasicMaterial({ 
        color: STATE_CONFIG.idle.color,
        linewidth: 2
      });
      const edges = new THREE.LineSegments(edgesGeometry, edgesMaterial);
      agent.add(edges);
      
      // 底部光环 - 科幻反光效果
      const baseGeometry = new THREE.RingGeometry(0.8, 1.4, 64);
      const baseMaterial = new THREE.MeshStandardMaterial({
        color: STATE_CONFIG.idle.color,
        emissive: STATE_CONFIG.idle.color,
        emissiveIntensity: 0.8,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide,
        metalness: 0.8,
        roughness: 0.2
      });
      baseRing = new THREE.Mesh(baseGeometry, baseMaterial);
      baseRing.rotation.x = -Math.PI / 2;
      baseRing.position.y = -1.35;
      scene.add(baseRing);
      
      // 第二个光环 - 外圈
      const baseGeometry2 = new THREE.RingGeometry(1.5, 1.7, 64);
      const baseMaterial2 = new THREE.MeshBasicMaterial({
        color: STATE_CONFIG.idle.color,
        transparent: true,
        opacity: 0.25,
        side: THREE.DoubleSide
      });
      const baseRing2 = new THREE.Mesh(baseGeometry2, baseMaterial2);
      baseRing2.rotation.x = -Math.PI / 2;
      baseRing2.position.y = -1.35;
      scene.add(baseRing2);
      
      // 背景粒子
      createParticles();
      
      // 初始化目标值
      setState('idle', '等待任务...');
      
      // 开始动画循环
      animate();
      
      // 窗口大小调整
      window.addEventListener('resize', onWindowResize);
    }

    // 背景粒子 - 星空效果
    function createParticles() {
      const particleCount = 300;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      
      for (let i = 0; i < particleCount * 3; i += 3) {
        positions[i] = (Math.random() - 0.5) * 30;
        positions[i + 1] = (Math.random() - 0.5) * 30;
        positions[i + 2] = (Math.random() - 0.5) * 30 - 10;
        
        // 星星颜色 - 蓝白色
        const brightness = 0.5 + Math.random() * 0.5;
        colors[i] = brightness * 0.8;
        colors[i + 1] = brightness * 0.9;
        colors[i + 2] = brightness;
      }
      
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      
      const material = new THREE.PointsMaterial({
        size: 0.08,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true
      });
      
      const particles = new THREE.Points(geometry, material);
      scene.add(particles);
    }

    // 设置状态
    function setState(state, taskText = '') {
      const config = STATE_CONFIG[state] || STATE_CONFIG.idle;
      currentState = state;
      
      targetColor = config.color;
      targetEmissive = config.emissive;
      targetSpeed = config.speed;
      targetScale = config.scale;
      
      // 更新 3D 对象颜色
      if (agent && agent.material) {
        agent.material.emissive = new THREE.Color(targetEmissive);
      }
      if (agentEdges && agentEdges.material) {
        agentEdges.material.color = new THREE.Color(targetColor);
      }
      if (baseRing && baseRing.material) {
        baseRing.material.color = new THREE.Color(targetColor);
      }
      
      // 更新 UI
      document.getElementById('state-text').textContent = config.message;
      document.getElementById('state-dot').style.backgroundColor = '#' + config.color.toString(16).padStart(6, '0');
      document.getElementById('task-text').textContent = taskText || '等待任务...';
      
      // 播放状态音效
      playStateSound(state);
    }

    // 动画循环
    function animate() {
      requestAnimationFrame(animate);
      
      const time = clock.getElapsedTime();
      const delta = clock.getDelta();
      const config = STATE_CONFIG[currentState];
      
      // 平滑过渡颜色
      agent.material.color.lerp(new THREE.Color(targetColor), 0.05);
      agent.material.emissive.lerp(new THREE.Color(targetEmissive), 0.05);
      
      // 状态动画
      switch (config.animation) {
        case 'breathe':
          // 呼吸效果 - 轻微上下浮动
          if (agent) agent.position.y = Math.sin(time * config.speed) * 0.1;
          if (baseRing) baseRing.scale.setScalar(1 + Math.sin(time * config.speed * 0.5) * 0.1);
          if (agentEdges) agentEdges.material.color.lerp(new THREE.Color(targetColor), 0.1);
          break;
          
        case 'scan':
          // 扫描效果 - 像是启动扫描
          if (agent) agent.position.y = Math.sin(time * 2) * 0.15;
          if (baseRing) baseRing.scale.setScalar(1 + Math.sin(time * 3) * 0.15);
          if (agentEdges) agentEdges.material.color.lerp(new THREE.Color(targetColor), 0.1);
          break;
          
        case 'active':
          // 活跃效果 - 快速旋转 + 放大
          if (agent) {
            agent.rotation.y = time * 0.5;
            agent.position.y = Math.sin(time * 4) * 0.1;
          }
          if (baseRing) baseRing.scale.setScalar(1 + Math.sin(time * 2) * 0.2);
          if (agentEdges) agentEdges.material.color.lerp(new THREE.Color(targetColor), 0.15);
          break;
          
        case 'alert':
          // 警报效果 - 强烈闪烁
          if (agent) {
            agent.material.emissiveIntensity = Math.sin(time * 8) * 0.4 + 0.4;
            agent.position.x = Math.sin(time * 10) * 0.05;
          }
          if (agentEdges) agentEdges.material.color.lerp(new THREE.Color(targetColor), 0.2);
          if (baseRing) baseRing.material.opacity = Math.abs(Math.sin(time * 5)) * 0.8;
          break;
          
        case 'rotate':
          // 旋转效果 - 缓慢旋转展示
          if (agent) agent.rotation.y = time * config.speed;
          if (agentEdges) agentEdges.material.color.lerp(new THREE.Color(targetColor), 0.1);
          if (baseRing) baseRing.rotation.z = time * 0.2;
          break;
      }
      
      // 边缘发光跟随
      if (agentEdges) agentEdges.material.color.lerp(new THREE.Color(targetColor), 0.1);
      if (baseRing) {
        baseRing.material.color.lerp(new THREE.Color(targetColor), 0.1);
      }
      
      // 相机轻微移动
      camera.position.x = Math.sin(time * 0.1) * 0.3;
      camera.position.y = Math.cos(time * 0.15) * 0.2;
      camera.lookAt(agent.position);
      
      renderer.render(scene, camera);
    }

    // 窗口大小调整
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ============== 状态轮询 ==============
    let pollTimer;

    function startPolling() {
      updateConnectionStatus('connecting');
      fetchStatus();
      pollTimer = setInterval(fetchStatus, 3000);
    }

    function fetchStatus() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'http://192.168.10.155:34123/api/status?t=' + new Date().getTime(), true);
      xhr.onload = function() {
        console.log('XHR URL:', xhr.responseURL);
        console.log('XHR status:', xhr.status);
        console.log('XHR response:', xhr.responseText.substring(0, 100));
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            console.log('Got data:', data);
            updateConnectionStatus('connected');
            handleStatusUpdate(data);
          } catch(e) {
            console.log('JSON parse error:', e);
          }
        }
      };
      xhr.onerror = function() {
        console.log('XHR error');
        updateConnectionStatus('disconnected');
      };
      xhr.send();
    }

    async function updateStatus(status, message, task) {
      try {
        await fetch('/api/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status, message, task })
        });
      } catch (e) {
        console.log('Status update error:', e);
      }
    }

    function handleStatusUpdate(data) {
      console.log('Status update:', data);
      console.log('Setting state to:', data.status);
      
      // 根据状态更新显示
      const state = data.status || 'idle';
      const stateMap = {
        'idle': 'idle',
        'waiting': 'waiting',
        'thinking': 'thinking',
        'working': 'working',
        'executing': 'working',
        'error': 'error',
        'blocked': 'error'
      };
      
      const newState = stateMap[state] || 'idle';
      const taskText = data.task || data.message || '';
      console.log('Mapped state:', newState);
      setState(newState, taskText);
    }

    function updateConnectionStatus(status) {
      const el = document.getElementById('connection-status');
      el.className = status;
      
      switch (status) {
        case 'connected':
          el.textContent = '● 已连接';
          break;
        case 'connecting':
          el.textContent = '● 连接中...';
          break;
        case 'disconnected':
          el.textContent = '● 本地模式';
          break;
      }
    }

    // 启动轮询
    init();
    startPolling();
    
    // ============== 科幻格言 ==============
    const quotes = [
      { text: "The only way to discover the limits of the possible is to go beyond them into the impossible.", author: "Arthur C. Clarke" },
      { text: "Any sufficiently advanced technology is indistinguishable from magic.", author: "Arthur C. Clarke" },
      { text: "I have always loved the voice of the stars, and the dreams that come from them.", author: "Arthur C. Clarke" },
      { text: "Two possibilities exist: either we are alone in the Universe or we are not. Both are equally terrifying.", author: "Arthur C. Clarke" },
      { text: "The Earth is just too small and fragile a basket for the human race to keep all its eggs in.", author: "Arthur C. Clarke" },
      { text: "I'm sorry, Dave. I'm afraid I can't do that.", author: "HAL 9000" },
      { text: "The universe is under no obligation to make sense to you.", author: "Neil deGrasse Tyson" },
      { text: "Space is for everybody.", author: "Christa McAuliffe" },
      { text: "Across the sea of space, the stars are other suns.", author: "Carl Sagan" },
      { text: "We are made of starstuff.", author: "Carl Sagan" },
      { text: "The cosmos is within us. We are a way for the universe to know itself.", author: "Carl Sagan" },
      { text: "Somewhere, something incredible is waiting to be known.", author: "Carl Sagan" },
      { text: "The sky is the daily bread of the eyes.", author: "Ralph Waldo Emerson" },
      { text: "To confine our attention to terrestrial matters would be to limit the human spirit.", author: "Stephen Hawking" },
      { text: "Intelligence is the ability to adapt to change.", author: "Stephen Hawking" },
      { text: "Look up at the stars and not down at your feet. Try to make sense of what you see.", author: "Stephen Hawking" },
      { text: "The thing about smart people is that they seem crazy to dumb people.", author: "Bob太平" },
      { text: "I don't want to achieve immortality through my work... I want to achieve it through not dying.", author: "Woody Allen" },
      { text: "The future is not what it used to be.", author: "Yogi Berra" },
      { text: "It is characteristic of the human mind to try to devise theories to account for the origins of things.", author: "Robert Oppenheimer" },
      { text: "Now, I am become Death, the destroyer of worlds.", author: "Robert Oppenheimer" },
      { text: "There might be an infinite number of stories... all happening at the same time.", author: "Liu Cixin" },
      { text: "The universe is a vast, dark ocean. We are just a small, isolated island of life.", author: "Liu Cixin" },
      { text: "The stars are the landmines of the universe. They explode and destroy everything nearby.", author: "Liu Cixin" },
      { text: "No one can imagine how beautiful the starlight is until they see it with their own eyes.", author: "Liu Cixin" },
      { text: "To the stars who listen—and the dreams that are answered.", author: "Sanderson" },
      { text: "Fiction is the dream of the collective consciousness.", author: "Ursula K. Le Guin" },
      { text: "We live in capitalism. Its power seems inescapable. So did the divine right of kings.", author: "Ursula K. Le Guin" }
    ];
    
    function showRandomQuote() {
      const quote = quotes[Math.floor(Math.random() * quotes.length)];
      const el = document.getElementById('quote');
      el.innerHTML = '"' + quote.text + '"<br><span style="font-size:12px;opacity:0.7">— ' + quote.author + '</span>';
      el.style.opacity = 0;
      setTimeout(() => {
        el.style.transition = 'opacity 2s';
        el.style.opacity = 1;
      }, 100);
    }
    
    // 每2小时更新一次格言
    showRandomQuote();
    setInterval(showRandomQuote, 2 * 60 * 60 * 1000);
  </script>
</body>
</html>
